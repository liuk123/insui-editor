@if (openThreads().length > 0) {
  <h3 insTitle="s">评论</h3>
  @for (thread of openThreads(); track thread.id) {
    <div
      insCardLarge
      [class.ins-comments-panel__thread_active]="thread.id === activeThreadId()"
      (click)="setActiveThread(thread.id, thread.quote, thread.anchor)"
    >
      <div insHeader>
        <div insTitle="s">
          {{ thread.quote || '未命名引用' }}
        </div>
        <div insAccessories>
          <button
            insButton
            appearance="flat"
            size="s"
            [disabled]="!canEdit()"
            (click.stop)="resolveThread(thread.id, !thread.resolved)"
          >
            {{ thread.resolved ? '重新打开' : '标记已解决' }}
          </button>
        </div>
      </div>
      <ul class="ins-comments-panel__comments">
        @for (comment of thread.comments; track comment.id) {
          <li class="ins-comments-panel__comment">
            <span class="ins-comments-panel__author">{{ comment.author }}</span>
            <span class="ins-comments-panel__text">{{ comment.content }}</span>
          </li>
        }
      </ul>
      <div insCardFooter class="ins-comments-panel__reply">
        <ins-textfield (click)="$event.stopPropagation()">
          <textarea placeholder="回复评论" insTextarea [disabled]="!canEdit()" rows="4" [(ngModel)]="draft[thread.id]"></textarea>
        </ins-textfield>
        <div class="ins-comments-panel__reply-button">
          <button
            insButton
            appearance="primary"
            [disabled]="!canEdit()"
            (click.stop)="addReply(thread.id)"
          >
            发送
          </button>
        </div>
      </div>
    </div>
  }
}
